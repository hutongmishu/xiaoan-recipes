<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8B4513">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>菜谱详情 - 小安做菜</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>
  <div class="app">
    <!-- 返回按钮 -->
    <div class="back-bar">
      <a href="index.html" class="back-btn">← 返回</a>
    </div>

    <!-- 菜谱内容 -->
    <main class="recipe-detail" id="recipeDetail">
      <!-- 内容由 JS 生成 -->
    </main>

    <!-- 底部操作栏 -->
    <div class="detail-actions">
      <button class="action-btn" id="cookModeBtn">
        <span>👨‍🍳 开始跟做</span>
      </button>
    </div>

    <!-- 跟做模式 -->
    <div class="cooking-modal" id="cookingModal">
      <div class="cooking-content">
        <div class="cooking-header">
          <span class="cooking-progress" id="cookingProgress">步骤 1/3</span>
          <button class="cooking-close" id="closeCooking">✕</button>
        </div>
        
        <div class="cooking-step" id="cookingStep">
          <!-- 步骤内容由 JS 生成 -->
        </div>
        
        <div class="cooking-nav">
          <button class="nav-btn" id="prevStep">上一步</button>
          <button class="nav-btn primary" id="nextStep">下一步</button>
        </div>
      </div>
    </div>
  </div>

  <script src="data/recipes.js"></script>
  <script src="js/recipe.js"></script>
  <script>
    // Service Worker 更新检测
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('js/sw.js')
        .then(reg => {
          reg.update();
          // 监听更新消息
          navigator.serviceWorker.addEventListener('message', event => {
            if (event.data && event.data.type === 'UPDATE_AVAILABLE') {
              const updateBar = document.createElement('div');
              updateBar.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                background: #4caf50;
                color: white;
                padding: 12px 16px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                z-index: 9999;
                font-size: 15px;
              `;
              updateBar.innerHTML = `
                <span>🎉 有新版本可用</span>
                <button onclick="location.reload()" style="background:white;color:#4caf50;border:none;padding:6px 16px;border-radius:4px;font-size:14px;cursor:pointer;">立即刷新</button>
              `;
              document.body.appendChild(updateBar);
            }
          });
        });
    }
  </script>
</body>
</html>
